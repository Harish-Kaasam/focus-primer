name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-size: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pywebview pyinstaller

      - name: Build Standalone Executable
        run: |
          pyinstaller --onefile --windowed --add-data "src/index.html;." --icon "assets/app-icon.ico" --name "FocusPrimer" src/main.py

      - name: Compile Inno Setup Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" FocusPrimer.iss

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: focus-primer-release
          path: |
            dist/FocusPrimer.exe
            releases/v1.0.0/FocusPrimerSetup.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: focus-primer-release
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/FocusPrimer.exe
            release-assets/FocusPrimerSetup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
